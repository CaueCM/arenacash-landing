<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArenaCash — Sua conta digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-red: #FF494C;
      --brand-red-hover: #E63B3E;
      --brand-red-press: #C8282B;
      --brand-black: #0A0A0A;
      --brand-white: #FFFFFF;
      --neutral-900: #141414;
      --neutral-700: #333333;
      --neutral-500: #7A7A7A;
      --neutral-300: #D1D1D1;
      --radius-md: 10px;
      --radius-lg: 16px;
      --ease-standard: cubic-bezier(0.2, 0.6, 0.2, 1);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--brand-white);
      color: var(--neutral-900);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 96px 24px 64px;
    }
    .brand {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-red);
      margin-bottom: 32px;
    }
    h1 {
      font-family: 'Archivo', sans-serif;
      font-weight: 900;
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--brand-black);
      margin: 0 0 16px;
    }
    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: var(--neutral-700);
      margin: 0 0 40px;
      max-width: 60ch;
    }
    .cta {
      display: inline-block;
      background: var(--brand-red);
      color: var(--brand-white);
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(255, 73, 76, 0.25);
      transition: background-color 150ms var(--ease-standard);
    }
    .cta:hover { background: var(--brand-red-hover); }
    .cta:active { background: var(--brand-red-press); transform: translateY(1px); }

    .features {
      margin-top: 96px;
      display: grid;
      gap: 16px;
    }
    .feature {
      background: var(--brand-white);
      border: 1px solid var(--neutral-300);
      border-radius: var(--radius-lg);
      padding: 16px;
      transition: border-color 150ms var(--ease-standard);
    }
    .feature:hover { border-color: var(--brand-red); }
    .feature h3 {
      font-family: 'Archivo', sans-serif;
      font-weight: 600;
      font-size: 18px;
      line-height: 1.15;
      margin: 0 0 6px;
      color: var(--brand-black);
    }
    .feature p {
      font-size: 14px;
      line-height: 1.45;
      color: var(--neutral-500);
      margin: 0;
    }

    footer {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid var(--neutral-300);
      color: var(--neutral-500);
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">ArenaCash</div>

    <h1>ArenaCash</h1>

    <p class="subtitle">O cash da nova economia.</p>

    <a href="#abrir-conta" class="cta">Abrir conta</a>

    <div class="features">
      <div class="feature">
        <h3>Conta sem tarifa</h3>
        <p>Zero mensalidade, zero TED, zero pegadinha.</p>
      </div>
      <div class="feature">
        <h3>Pix instantâneo</h3>
        <p>Envia e recebe na hora, 24/7.</p>
      </div>
      <div class="feature">
        <h3>Cartão virtual em 90 segundos</h3>
        <p>Aprovado direto no app, sem espera.</p>
      </div>
    </div>

    <footer>© ArenaCash · Uma fintech fictícia da Product Arena.</footer>
  </div>
</body>
</html>
